<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cart | COVERIFY</title>

    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/cart.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<header class="navbar">

    <div class="logo">COVERIFY</div>

    <nav>

        <a href="index.html">Home</a>

        <a href="shop.html">Shop</a>

        <a href="cart.html">
            🛒<span id="cart-count">0 Items</span>
        </a>

    </nav>

</header>

<section class="cart-page">

    <div class="container">

        <div class="cart-header">

            <div class="cart-title">

                <h1>Shopping Cart</h1>

                <p>Your selected products are ready for checkout.</p>

            </div>

            <div class="cart-counter">

                <span id="cart-count-large">0 Items</span>

            </div>

        </div>

        <div class="cart-layout">

            <!-- LEFT -->

            <div class="cart-products">

                <div id="cart-items"></div>

            </div>

            <!-- RIGHT -->

            <aside class="cart-summary">

                <h2>Order Summary</h2>

                <div class="summary-row">

                    <span>Subtotal</span>

                    <span id="subtotal">0 QAR</span>

                </div>

                <div class="summary-row">

                    <span>Delivery</span>

                    <span id="delivery">10 QAR</span>

                </div>

                <div class="summary-row total">

                    <span>Total</span>

                    <span id="total">0 QAR</span>

                </div>

                <button class="checkout-btn" id="checkout-btn">

                    Place Order on WhatsApp

                </button>

                <div class="secure-note">

                    ✓ Fast delivery across Qatar

                </div>

            </aside>

        </div>

    </div>

</section>

<script src="js/products.js"></script>
<script src="js/cart.js"></script>
<script src="js/animations.js"></script>

</body>

</html>
