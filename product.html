<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Product | COVERIFY</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<header class="navbar">

<div class="logo">COVERIFY</div>

<nav>

<a href="index.html">Home</a>
<a href="shop.html">Shop</a>
<a href="cart.html">
🛒 <span id="cart-count">0</span>
</a>

</nav>

</header>

<section class="product-page">

<div class="product-container">

<div class="product-image">
<img id="product-image" alt="Product Image">
</div>

<div class="product-info">

<h1 id="product-name"></h1>

<h2 id="product-price"></h2>

<p id="product-description"></p>

<div class="badges">
<span>Premium Quality</span>
<span>Shock Protection</span>
<span>Fast Delivery</span>
</div>

<label for="phone-model">Choose your iPhone model</label>

<select id="phone-model">
</select>

<label>Quantity</label>

<div class="quantity">

<button type="button" onclick="changeQty(-1)">−</button>

<input id="qty" type="text" value="1" readonly>

<button type="button" onclick="changeQty(1)">+</button>

</div>

<button id="addCart" class="btn">
Add To Cart
</button>

</div>

</div>

</section>

<script src="products.js"></script>
<script src="cart.js"></script>
<script src="script.js"></script>

</body>

</html>
