<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Product | COVERIFY</title>

<link rel="stylesheet" href="css/common.css">
<link rel="stylesheet" href="css/product.css">
<link rel="stylesheet" href="css/shop.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<header class="navbar">

<div class="logo">COVERIFY</div>

<nav>

<a href="index.html">Home</a>
<a href="shop.html">Shop</a>
<a href="cart.html">
🛒 <span id="cart-count">0</span>
</a>

</nav>

</header>

<section class="product-page">

<div class="product-container reveal">
    <div class="product-image">

    <div class="image-card">

        <img id="product-image" alt="Product Image">

    </div>

</div>
    <div class="product-info">

        <span class="product-category">
            Premium Collection
        </span>

        <h1 id="product-name"></h1>

        <div class="rating">

            ★★★★★

            <span>4.9 (128 Reviews)</span>

        </div>

        <h2 id="product-price"></h2>

        <p id="product-description"></p>

        <div class="feature-list">

    <div class="feature">
        <span>🛡️</span>
        <p>Premium Materials</p>
    </div>

    <div class="feature">
        <span>📷</span>
        <p>Raised Camera Protection</p>
    </div>

    <div class="feature">
        <span>📱</span>
        <p>Precision Fit</p>
    </div>

    <div class="feature">
        <span>🚚</span>
        <p>Fast Delivery in Qatar</p>
    </div>

</div>

        <div class="purchase-box">

            <label for="phone-model">

                Choose your iPhone

            </label>

            <select id="phone-model"></select>

            <label>

                Quantity

            </label>

            <div class="quantity">

                <button onclick="changeQty(-1)">−</button>

                <input id="qty" value="1" readonly>

                <button onclick="changeQty(1)">+</button>

            </div>

           <button id="addCart" class="btn">
    Add to Cart
</button>

<a href="cart.html" id="goCart" class="btn go-cart-btn" style="display:none;">
    🛒 Go to Cart
</a>


        </div>

    </div>

</div>

</section>
<section class="related-products">

    <div class="container">

        <h2>You May Also Like</h2>

        <div id="related-grid" class="products"></div>

    </div>

</section>
<script src="js/products.js"></script>
<script src="js/product.js"></script>
<script src="js/animations.js"></script>
</body>

</html>
